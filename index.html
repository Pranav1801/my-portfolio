<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pranav Gupta — Software Developer. Portfolio of web, mobile and AI tooling projects." />
  <title>Pranav Gupta — Software Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="preloader"><span class="preloader-text">PG</span></div>
  <div class="progress-bar" aria-hidden="true"></div>
  <div class="cursor" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>
  <canvas id="webgl" aria-hidden="true"></canvas>

  <header class="nav">
    <a href="#hero" class="nav-logo" data-magnetic>PG</a>
    <nav class="nav-links">
      <a href="#work" data-magnetic>Work</a>
      <a href="#about" data-magnetic>About</a>
      <a href="#contact" data-magnetic>Contact</a>
    </nav>
  </header>

  <main id="app">
    <section id="hero" class="section hero">
      <p class="hero-eyebrow" data-reveal></p>
      <h1 class="hero-title"></h1>
      <p class="hero-tagline" data-reveal></p>
      <div class="scroll-hint" aria-hidden="true"><span></span>scroll</div>
    </section>

    <section id="about" class="section about">
      <h2 class="section-title" data-split>About</h2>
      <div class="about-body" data-reveal></div>
    </section>

    <section id="skills" class="section skills">
      <h2 class="section-title" data-split>Skills</h2>
      <div class="skills-groups"></div>
      <a class="resume-btn" href="Pranav_Gupta_Resume.pdf" download data-magnetic data-reveal>Resume &#8595;</a>
    </section>

    <section id="work" class="section work">
      <h2 class="section-title" data-split>Selected Work</h2>
      <div class="projects"></div>
      <a class="show-all" href="projects.html" data-magnetic data-reveal>All projects &#8599;</a>
    </section>

    <section id="experience" class="section experience">
      <h2 class="section-title" data-split>Experience</h2>
      <div class="timeline"></div>
    </section>

    <section id="contact" class="section contact">
      <p class="contact-eyebrow" data-reveal>Have an idea?</p>
      <a class="contact-cta" data-split data-magnetic href=""></a>
      <div class="contact-links"></div>
      <footer class="footer">
        <span class="footer-name"></span>
        <span>Built with Three.js · GSAP · Markdown</span>
      </footer>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
